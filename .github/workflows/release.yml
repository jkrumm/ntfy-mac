name: Release

on:
  push:
    branches: [master]

jobs:
  release:
    runs-on: macos-latest # required: bun cross-compile targets need macOS
    permissions:
      contents: write
      issues: write
      pull-requests: write

    outputs:
      new_release_published: ${{ steps.release.outputs.new_release_published }}
      new_release_version: ${{ steps.release.outputs.new_release_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs full history

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate
        run: bun run validate

      # cycjimmy/semantic-release-action wraps semantic-release and correctly
      # exposes new_release_published + new_release_version as step outputs.
      # Plain `bunx semantic-release` does NOT write to $GITHUB_OUTPUT.
      - name: Release
        id: release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build binaries
        if: steps.release.outputs.new_release_published == 'true'
        env:
          VERSION: ${{ steps.release.outputs.new_release_version }}
        run: |
          mkdir -p dist
          bun build --compile --target=bun-darwin-arm64 src/index.ts \
            --outfile dist/ntfy-mac-arm64 \
            --define "APP_VERSION=\"${VERSION}\""
          bun build --compile --target=bun-darwin-x64 src/index.ts \
            --outfile dist/ntfy-mac-x64 \
            --define "APP_VERSION=\"${VERSION}\""

      - name: Upload release assets
        if: steps.release.outputs.new_release_published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.release.outputs.new_release_version }}
        run: |
          gh release upload "v${VERSION}" \
            dist/ntfy-mac-arm64 \
            dist/ntfy-mac-x64

  update-formula:
    needs: release
    runs-on: ubuntu-latest
    if: needs.release.outputs.new_release_published == 'true'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Download release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release.outputs.new_release_version }}
        run: |
          gh release download "v${VERSION}" \
            --pattern "ntfy-mac-*" \
            --dir dist/

      - name: Compute checksums
        run: |
          echo "SHA256_ARM64=$(sha256sum dist/ntfy-mac-arm64 | cut -d' ' -f1)" >> $GITHUB_ENV
          echo "SHA256_X64=$(sha256sum dist/ntfy-mac-x64 | cut -d' ' -f1)" >> $GITHUB_ENV

      - name: Update formula
        env:
          VERSION: ${{ needs.release.outputs.new_release_version }}
        run: |
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/ntfy-mac.rb
          sed -i "s/sha256 \".*\" # arm64/sha256 \"${SHA256_ARM64}\" # arm64/" Formula/ntfy-mac.rb
          sed -i "s/sha256 \".*\" # x64/sha256 \"${SHA256_X64}\" # x64/" Formula/ntfy-mac.rb

      - name: Commit formula update
        env:
          VERSION: ${{ needs.release.outputs.new_release_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin master
          git add Formula/ntfy-mac.rb
          git commit -m "chore(formula): update to v${VERSION}"
          git push
