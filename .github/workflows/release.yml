name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type (leave blank for auto from commits)"
        required: false
        type: choice
        default: ""
        options: ["", patch, minor, major]

jobs:
  release:
    runs-on: macos-latest # required: bun cross-compile targets need macOS
    permissions:
      contents: write
      issues: write
      pull-requests: write

    outputs:
      new_release_published: ${{ steps.release.outputs.new_release_published }}
      new_release_version: ${{ steps.release.outputs.new_release_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs full history
          token: ${{ secrets.RELEASE_TOKEN }} # PAT as jkrumm — bypasses branch protection ruleset

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate
        run: bun run validate

      # cycjimmy/semantic-release-action wraps semantic-release and correctly
      # exposes new_release_published + new_release_version as step outputs.
      # Plain `bunx semantic-release` does NOT write to $GITHUB_OUTPUT.
      # extra_plugins required: action does not auto-discover from package.json.
      - name: Release
        id: release
        uses: cycjimmy/semantic-release-action@v6
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/github
          extra_args: ${{ inputs.release_type != '' && format('--release-as {0}', inputs.release_type) || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }} # must be PAT, not default token — github-actions[bot] has no bypass rights

  # Separated from the release job so that update-formula only runs after
  # binaries are fully uploaded. A build failure won't orphan a released
  # version without assets — the formula stays on the previous good version.
  build-and-upload:
    needs: release
    runs-on: macos-latest
    if: needs.release.outputs.new_release_published == 'true'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binaries
        env:
          VERSION: ${{ needs.release.outputs.new_release_version }}
        run: |
          npm_package_version="${VERSION}" bun run build

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release.outputs.new_release_version }}
        run: |
          gh release upload "v${VERSION}" \
            dist/ntfy-mac \
            dist/ntfy-notify.app.tar.gz

  update-formula:
    needs: [release, build-and-upload]
    runs-on: ubuntu-latest
    if: needs.release.outputs.new_release_published == 'true'
    permissions:
      contents: read # no longer needs write to own repo

    steps:
      - uses: actions/checkout@v4
        with:
          repository: jkrumm/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Download release assets
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.release.outputs.new_release_version }}
        run: |
          gh release download "v${VERSION}" \
            --repo jkrumm/ntfy-mac \
            --pattern "ntfy-mac" \
            --pattern "ntfy-notify.app.tar.gz" \
            --dir dist/

      - name: Compute checksums
        run: |
          echo "SHA256_BIN=$(sha256sum dist/ntfy-mac | cut -d' ' -f1)" >> $GITHUB_ENV
          echo "SHA256_HELPER=$(sha256sum dist/ntfy-notify.app.tar.gz | cut -d' ' -f1)" >> $GITHUB_ENV

      - name: Update formula
        env:
          VERSION: ${{ needs.release.outputs.new_release_version }}
        run: |
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/ntfy-mac.rb
          sed -i "s/sha256 \".*\" # ntfy-mac/sha256 \"${SHA256_BIN}\" # ntfy-mac/" Formula/ntfy-mac.rb
          sed -i "s/sha256 \".*\" # ntfy-notify/sha256 \"${SHA256_HELPER}\" # ntfy-notify/" Formula/ntfy-mac.rb

      - name: Commit and push
        env:
          VERSION: ${{ needs.release.outputs.new_release_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ntfy-mac.rb
          git commit -m "chore(ntfy-mac): update to v${VERSION}"
          git push
